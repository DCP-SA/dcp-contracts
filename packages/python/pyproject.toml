[project]
name = "dcp-contracts"
version = "0.1.0"
description = "DCP shared API contracts — Python pydantic models generated from openapi/dcp.yaml"
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "Proprietary" }
dependencies = ["pydantic>=2.0"]

[project.urls]
Repository = "https://github.com/DCP-SA/dcp-contracts"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["dcp_contracts*"]
